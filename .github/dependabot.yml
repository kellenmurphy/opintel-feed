version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "08:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      anthropic:
        patterns:
          - "anthropic"
      http:
        patterns:
          - "requests"
          - "httpx"
          - "httpcore"
          - "urllib3"
          - "certifi"
