name: Regenerate lockfile

on:
  push:
    paths:
      - 'requirements.in'

permissions:
  contents: write

jobs:
  pip-compile:
    name: Regenerate requirements.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Regenerate lockfile
        run: pip-compile requirements.in --generate-hashes --strip-extras --output-file requirements.txt

      - name: Commit if changed (signed via GitHub API)
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          if git diff --quiet -- requirements.txt; then
            echo "No changes to requirements.txt"
            exit 0
          fi
          HEAD_OID=$(git rev-parse HEAD)
          CONTENT=$(base64 -w0 requirements.txt)
          gh api graphql \
            -f query='mutation($repo:String!,$branch:String!,$oid:GitObjectID!,$path:String!,$contents:Base64String!,$msg:String!){createCommitOnBranch(input:{branch:{repositoryNameWithOwner:$repo,branchName:$branch},expectedHeadOid:$oid,message:{headline:$msg},fileChanges:{additions:[{path:$path,contents:$contents}]}}){commit{oid}}}' \
            -f repo="${{ github.repository }}" \
            -f branch="${{ github.ref_name }}" \
            -f oid="$HEAD_OID" \
            -f path="requirements.txt" \
            -f contents="$CONTENT" \
            -f msg="chore: regenerate requirements.txt lockfile"
